name: Notify downstream repos on template release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.load.outputs.repos }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      prev_tag: ${{ steps.changelog.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load downstream repo list
        id: load
        run: |
          repos=$(jq -c '.repos' .github/downstream-repos.json)
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from previous tag
        id: changelog
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          echo "prev_tag=${PREV_TAG:-none}" >> "$GITHUB_OUTPUT"

          if [ -n "$PREV_TAG" ]; then
            TOTAL=$(git log --oneline "${PREV_TAG}..${CURRENT_TAG}" -- template/ copier.yml | wc -l)
            LOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..${CURRENT_TAG}" -- template/ copier.yml | head -20)
            if [ "$TOTAL" -gt 20 ]; then
              LOG="${LOG}"$'\n'"- ... and $((TOTAL - 20)) more commits"
            fi
          else
            LOG="(初回リリース)"
          fi

          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  dispatch:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.prepare.outputs.repos) }}
    steps:
      - name: Build payload
        id: payload
        env:
          TEMPLATE_VERSION: ${{ github.ref_name }}
          TEMPLATE_REPO: ${{ github.repository }}
          PREV_TAG: ${{ needs.prepare.outputs.prev_tag }}
          CHANGELOG: ${{ needs.prepare.outputs.changelog }}
        run: |
          PAYLOAD=$(jq -cn \
            --arg ver "$TEMPLATE_VERSION" \
            --arg repo "$TEMPLATE_REPO" \
            --arg prev "$PREV_TAG" \
            --arg log "$CHANGELOG" \
            '{template_version: $ver, template_repo: $repo, prev_tag: $prev, changelog: $log}')
          echo "json=$PAYLOAD" >> "$GITHUB_OUTPUT"

      - name: Send repository dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOWNSTREAM_PAT }}
          repository: ${{ matrix.repo }}
          event-type: template-updated
          client-payload: ${{ steps.payload.outputs.json }}
