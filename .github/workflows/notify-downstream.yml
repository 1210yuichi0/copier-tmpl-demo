name: Notify downstream repos on template release

on:
  push:
    tags:
      - "v*"

jobs:
  load-repos:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.load.outputs.repos }}
    steps:
      - uses: actions/checkout@v4
      - name: Load downstream repo list
        id: load
        run: |
          repos=$(jq -c '.repos' .github/downstream-repos.json)
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

  dispatch:
    needs: load-repos
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.load-repos.outputs.repos) }}
    steps:
      - name: Send repository dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOWNSTREAM_PAT }}
          repository: ${{ matrix.repo }}
          event-type: template-updated
          client-payload: '{"template_version": "${{ github.ref_name }}", "template_repo": "${{ github.repository }}"}'
