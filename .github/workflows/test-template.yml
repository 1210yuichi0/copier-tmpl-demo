name: Test template generation

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "default"
            python_version: "3.12"
            use_docker: true
          - name: "py311-no-docker"
            python_version: "3.11"
            use_docker: false
          - name: "py313"
            python_version: "3.13"
            use_docker: true

    name: generate (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install Copier
        run: pip install "copier>=9,<10"

      - name: Generate project from template
        run: |
          mkdir /tmp/test-project && cd /tmp/test-project && git init
          copier copy --defaults \
            --data project_name=test-project \
            --data author=ci-test \
            --data use_docker=${{ matrix.use_docker }} \
            --data python_version=${{ matrix.python_version }} \
            --vcs-ref HEAD \
            ${{ github.workspace }} . --trust

      - name: Verify generated files
        run: |
          cd /tmp/test-project
          echo "=== Generated files ==="
          find . -not -path './.git/*' -not -path './.git' | sort

          test -f pyproject.toml      || { echo "FAIL: pyproject.toml missing"; exit 1; }
          test -f README.md           || { echo "FAIL: README.md missing"; exit 1; }
          test -f .copier-answers.yml || { echo "FAIL: .copier-answers.yml missing"; exit 1; }

          if [ "${{ matrix.use_docker }}" = "true" ]; then
            test -f Dockerfile      || { echo "FAIL: Dockerfile missing (use_docker=true)"; exit 1; }
            test -f .dockerignore   || { echo "FAIL: .dockerignore missing (use_docker=true)"; exit 1; }
          else
            test ! -f Dockerfile    || { echo "FAIL: Dockerfile exists (use_docker=false)"; exit 1; }
          fi

      - name: Validate pyproject.toml
        run: |
          cd /tmp/test-project
          pip install validate-pyproject
          validate-pyproject pyproject.toml

      - name: Install generated project
        run: |
          cd /tmp/test-project
          pip install -e ".[dev]"

      - name: Run linter
        run: |
          cd /tmp/test-project
          ruff check .

      - name: Run tests
        run: |
          cd /tmp/test-project
          pytest --no-header -rN || test $? -eq 5
