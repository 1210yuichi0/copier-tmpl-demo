_min_copier_version: "9.0.0"
_subdirectory: "template"
_templates_suffix: ".jinja"
_exclude:
  - "{% if not use_docker or adoption_phase < 3 %}Dockerfile{% endif %}"
  - "{% if not use_docker or adoption_phase < 3 %}.dockerignore{% endif %}"
  - "{% if adoption_phase < 2 %}pyproject.toml{% endif %}"

project_name:
  type: str
  help: "プロジェクト名を入力してください"
  validator: "{% if not project_name | regex_search('^[a-z][a-z0-9_-]*$') %}プロジェクト名は小文字英数字・ハイフン・アンダースコアのみ使用可能です{% endif %}"

author:
  type: str
  help: "作者名"
  default: "your-name"

use_docker:
  type: bool
  help: "Dockerfileを生成しますか？"
  default: true

python_version:
  type: str
  help: "Pythonバージョン"
  default: "3.12"
  choices:
    - "3.11"
    - "3.12"
    - "3.13"

adoption_phase:
  type: int
  help: "導入フェーズ (1=CI+README, 2=+pyproject, 3=+Docker)"
  default: 3
  choices:
    - 1
    - 2
    - 3
